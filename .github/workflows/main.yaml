name: Diabetes MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install and Fix Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install base requirements
        pip install setuptools
        pip install -r requirements.txt
        
        # Apply the MLOps Stack Fixes (Crucial for Python 3.12)
        pip install "evidently>=0.4.0,<0.5.0" --force-reinstall
        pip install "pandas<3.0.0" "cryptography<47.0.0" "pyarrow<24.0.0"
        
    - name: Verify MLflow Stack
      run: |
        python -c "import mlflow; print('✅ MLflow Library Fixed!')"
        python -c "import sklearn; print('✅ Scikit-learn Ready')"
        
    - name: Verify Monitoring Stack
      run: |
        # This confirms Evidently is properly structured in the CI environment
        python -c "from evidently.report import Report; print('✅ Monitoring Library Fixed!')"
        
    - name: Run Data Drift Check (Mock)
      run: |
        # Runs the monitoring script to ensure it can generate a report in CI
        python src/monitoring.py