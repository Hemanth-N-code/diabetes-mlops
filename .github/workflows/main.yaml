name: Diabetes MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools
        pip install -r requirements.txt
        
    - name: Run Model Training Check
      run: |
        # This ensures the script is syntactically correct and imports work
        python -c "import mlflow; import sklearn; print('ML Stack Ready')"
        
    - name: Run Monitoring Test
      run: |
        # Simple check to ensure Evidently is properly installed in the CI env
        python -c "from evidently.report import Report; print('Monitoring Stack Ready')"